# CI workflow — mise-en-place
# Runs on push to main/develop* and on PRs to main.
# Sets up SQLite (for Prisma migration compatibility in CI),
# installs deps, deploys migrations, and verifies the DB is usable.

name: Database Test

on:
  push:
    branches: [ main, 'develop*' ]
  pull_request:
    branches: [ main ]

jobs:
  test-database:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install SQLite
      run: |
        sudo apt-get update
        sudo apt-get install -y sqlite3
        sqlite3 --version

    - name: Install dependencies
      run: npm ci

    - name: Create test database and run migrations
      run: |
        echo "DATABASE_URL=file:./test.db" > .env.test
        npx prisma generate
        DATABASE_URL=file:./test.db npx prisma migrate deploy

    - name: Verify database seeding
      run: |
          echo 'const { PrismaClient } = require("@prisma/client");
          const prisma = new PrismaClient();
          
          async function checkTables() {
            try {
              const recipeCount = await prisma.recipe.count();
              console.log(`Database has ${recipeCount} recipes`);
              process.exit(0);
            } catch (error) {
              console.error("Error:", error);
              process.exit(1);
            } finally {
              await prisma.$disconnect();
            }
          }
          
          checkTables();' > verify.js
          
          DATABASE_URL=file:./test.db node verify.js
